<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Marshmallow</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="overlay"></div>

  <!-- HEADER -->
  <header>
    <div class="header-box">
      <h1>Marshmallow</h1>
      <p>Just me and you 💖</p>
    </div>

    <button id="memories-btn" onclick="showMemories()">♥</button>
  </header>

  <!-- CHAT AREA -->
  <main id="chat-wrapper">

    <div id="message-container"></div>

    <div id="typing-indicator"></div>

  </main>

  <!-- INPUT BAR -->
  <div id="input-section">
    <select id="sender-select">
      <option value="Mahlatse">Mahlatse</option>
      <option value="Ntebaleng">Ntebaleng</option>
    </select>

    <input id="message-input" placeholder="Type a message..." />

    <button id="send-button">Send</button>
  </div>

  <!-- MEMORIES -->
  <section id="memories-section">
    <h2>Our Memories</h2>
    <div id="memories-container"></div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
